version: "3.9"

services:
  # ─────────────── PostgreSQL ───────────────
  postgres:
    image: postgres:16-alpine
    container_name: investment_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       investment_portal
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres -d investment_portal"]
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 15s

  # ─────────────── Zookeeper ───────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: investment_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      test:     ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 15s

  # ─────────────── Kafka ───────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: investment_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    healthcheck:
      test:     ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout:  10s
      retries:  10
      start_period: 45s

  # ─────────────── Backend (Node.js) ───────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: investment_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      NODE_ENV:     production
      PORT:         5000

      # PostgreSQL (use service name as host)
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      investment_portal
      DB_USER:      postgres
      DB_PASSWORD:  postgres
      DB_SSL:       "false"

      JWT_SECRET:   investment_portal_secret_2024_egyGov

      # Kafka (use internal listener)
      KAFKA_BROKERS: kafka:29092

      JBPM_URL:     http://localhost:8080/kie-server/services/rest/server
    healthcheck:
      test:     ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 30s

  # ─────────────── Frontend (React + Nginx) ───────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: investment_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local
